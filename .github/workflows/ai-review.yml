name: AI Review

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to review
        required: true
        type: string
      pr_number:
        description: Pull request number
        required: true
        type: string

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group: ai-review-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  ai-review:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.draft == false
    name: AI Review
    runs-on:
      - self-hosted
      - windows
      - ai-runner

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.ref || github.ref }}

      - name: Run local AI review
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ inputs.pr_number }}
          AI_REVIEW_AGENT: ${{ vars.AI_REVIEW_AGENT }}
          CLAUDE_CLI_PATH: ${{ vars.CLAUDE_CLI_PATH }}
        run: powershell -NoProfile -NonInteractive -ExecutionPolicy Bypass -File .\scripts\run-ai-pr-review.ps1

      - name: Print review diagnostics
        if: always()
        shell: powershell
        run: |
          $tempRoot = if ($env:RUNNER_TEMP) { $env:RUNNER_TEMP } else { $env:TEMP }
          $diagnosticPath = Join-Path $tempRoot 'ai-review-diagnostics.log'
          $transcriptPath = Join-Path $tempRoot 'ai-review-transcript.log'
          $rawOutputPath = Join-Path $tempRoot 'ai-review-raw-output.log'

          if (Test-Path $diagnosticPath) {
            Write-Host '--- ai-review-diagnostics.log ---'
            Get-Content $diagnosticPath
          }
          else {
            Write-Host 'No diagnostic log produced.'
          }

          if (Test-Path $transcriptPath) {
            Write-Host '--- ai-review-transcript.log ---'
            Get-Content $transcriptPath
          }
          else {
            Write-Host 'No transcript log produced.'
          }

          if (Test-Path $rawOutputPath) {
            Write-Host '--- ai-review-raw-output.log ---'
            $stopToken = [guid]::NewGuid().ToString('N')
            $rawOutputText = Get-Content $rawOutputPath -Raw
            $maxChars = 16000
            if ($rawOutputText.Length -gt $maxChars) {
              $rawOutputText = $rawOutputText.Substring(0, $maxChars) + "`n[truncated raw Claude output log]"
            }
            Write-Host "::stop-commands::$stopToken"
            Write-Host $rawOutputText
            Write-Host "::$stopToken::"
          }
          else {
            Write-Host 'No raw output log produced.'
          }
