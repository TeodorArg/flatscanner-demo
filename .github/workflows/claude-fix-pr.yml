name: Claude Fix PR

on:
  issue_comment:
    types:
      - created
  pull_request_target:
    types:
      - labeled
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull request number
        required: true
        type: string

permissions:
  actions: write
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: claude-fix-${{ github.event.issue.number || github.event.pull_request.number || inputs.pr_number }}
  cancel-in-progress: true

jobs:
  resolve-pr:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.resolve.outputs.should_run }}
      pr_number: ${{ steps.resolve.outputs.pr_number }}
      head_ref: ${{ steps.resolve.outputs.head_ref }}
      head_repo: ${{ steps.resolve.outputs.head_repo }}
      base_ref: ${{ steps.resolve.outputs.base_ref }}
      trigger_label: ${{ steps.resolve.outputs.trigger_label }}
    steps:
      - name: Resolve PR context
        id: resolve
        uses: actions/github-script@v7
        with:
          script: |
            const eventName = context.eventName;
            let prNumber = null;
            let shouldRun = false;
            let triggerLabel = '';

            if (eventName === 'issue_comment') {
              const issue = context.payload.issue;
              const body = context.payload.comment?.body || '';
              if (issue?.pull_request && body.includes('/claude-fix')) {
                prNumber = issue.number;
                shouldRun = true;
              }
            } else if (eventName === 'pull_request_target') {
              const label = context.payload.label?.name || '';
              if (label === 'claude-fix') {
                prNumber = context.payload.pull_request.number;
                shouldRun = true;
                triggerLabel = label;
              }
            } else if (eventName === 'workflow_dispatch') {
              prNumber = Number(core.getInput('pr_number'));
              shouldRun = Number.isFinite(prNumber);
            }

            core.setOutput('should_run', shouldRun ? 'true' : 'false');
            if (!shouldRun) return;

            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });

            core.setOutput('pr_number', String(pr.number));
            core.setOutput('head_ref', pr.head.ref);
            core.setOutput('head_repo', pr.head.repo.full_name);
            core.setOutput('base_ref', pr.base.ref);
            core.setOutput('trigger_label', triggerLabel);

  claude-fix:
    needs: resolve-pr
    if: needs.resolve-pr.outputs.should_run == 'true'
    runs-on:
      - self-hosted
      - windows
      - codex

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          repository: ${{ needs.resolve-pr.outputs.head_repo }}
          ref: ${{ needs.resolve-pr.outputs.head_ref }}
          fetch-depth: 0

      - name: Fetch base branch
        shell: powershell
        run: |
          git fetch --no-tags origin ${{ needs.resolve-pr.outputs.base_ref }}

      - name: Run Claude PR fix
        shell: powershell
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ needs.resolve-pr.outputs.pr_number }}
          PR_HEAD_REF: ${{ needs.resolve-pr.outputs.head_ref }}
          PR_BASE_REF: ${{ needs.resolve-pr.outputs.base_ref }}
          TRIGGER_LABEL: ${{ needs.resolve-pr.outputs.trigger_label }}
        run: |
          .\scripts\run-claude-pr-fix.ps1

      - name: Redispatch required checks
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const prNumber = Number('${{ needs.resolve-pr.outputs.pr_number }}');
            const headRef = '${{ needs.resolve-pr.outputs.head_ref }}';
            const baseRef = '${{ needs.resolve-pr.outputs.base_ref }}';

            const { data: pr } = await github.rest.pulls.get({
              owner,
              repo,
              pull_number: prNumber,
            });

            const dispatches = [
              {
                workflow_id: 'ci.yml',
                ref: headRef,
                inputs: {
                  ref: headRef,
                },
              },
              {
                workflow_id: 'pr-guard.yml',
                ref: headRef,
                inputs: {
                  ref: headRef,
                  head_ref: headRef,
                  base_ref: baseRef,
                },
              },
              {
                workflow_id: 'ai-review.yml',
                ref: headRef,
                inputs: {
                  ref: headRef,
                  pr_number: String(pr.number),
                },
              },
            ];

            for (const dispatch of dispatches) {
              await github.rest.actions.createWorkflowDispatch({
                owner,
                repo,
                workflow_id: dispatch.workflow_id,
                ref: dispatch.ref,
                inputs: dispatch.inputs,
              });
            }
